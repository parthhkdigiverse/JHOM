<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JHOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="header-icon" style="margin-bottom: 20px; color: var(--slate-400);">
                <i data-lucide="building-2" style="width: 48px; height: 48px; margin: 0 auto;"></i>
            </div>
            <h1>JHOM</h1>
            <p>Enter your credentials to access the platform</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required
                    autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter password" required
                        autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i data-lucide="eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                Login
            </button>
        </form>

        <div class="login-footer">
            <p>Default Credentials:</p>
            <p><strong>Admin:</strong> admin1 / admin123</p>
            <p><strong>User:</strong> user1 / user123</p>
        </div>
    </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Production mode - no debug messages
        var DEBUG = false;

        // Check if already logged in (silently)
        if (auth && auth.isAuthenticated && auth.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var errorDiv = document.getElementById('errorMessage');
            var loginBtn = document.getElementById('loginBtn');

            // Clear previous errors
            errorDiv.textContent = '';
            errorDiv.style.display = 'none';

            // Disable button
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            // Check if auth exists
            if (typeof auth === 'undefined' || typeof auth.login !== 'function') {
                errorDiv.textContent = 'Authentication system not loaded. Please refresh the page.';
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
                return;
            }

            // Call login function
            auth.login(username, password)
                .then(function (result) {
                    if (result.success) {
                        // Success - redirect to dashboard
                        window.location.href = 'dashboard.html';
                    } else {
                        // Error - show message
                        errorDiv.textContent = result.message;
                        errorDiv.style.display = 'block';
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Login';
                    }
                })
                .catch(function (error) {
                    console.error('Login error:', error);
                    errorDiv.textContent = 'An unexpected error occurred. Please try again.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                });
        });

        // Password visibility toggle
        document.getElementById('togglePassword').addEventListener('click', function () {
            var passwordInput = document.getElementById('password');
            var toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                toggleIcon.setAttribute('data-lucide', 'eye');
            }
            
            // Re-initialize icon
            lucide.createIcons();
        });

        // Enter key submit
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
